services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: vertebraroot
    volumes:
      - mysqldata:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pvertebraroot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.vertebra-web.loadbalancer.server.port=8082"
    networks:
      - internal
      - coolify

volumes:
  mysqldata:

networks:
  internal:
  coolify:
    external: true
