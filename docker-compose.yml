services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: vertebraroot
    volumes:
      - mysqldata:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pvertebraroot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - vertebra-net

  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - vertebra-net

volumes:
  mysqldata:

networks:
  vertebra-net:
